<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Питание и успеваемость</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/index.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(at 20% 10%, rgba(99, 102, 241, 0.12) 0, transparent 50%),
                radial-gradient(at 80% 90%, rgba(245, 158, 11, 0.12) 0, transparent 50%);
        }
        .login-container {
            width: 100%;
            max-width: 440px;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(15, 23, 42, 0.12);
            padding: 48px 40px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .icon { font-size: 48px; display: block; margin-bottom: 12px; }
        .login-header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .login-header p { color: var(--muted); font-size: 14px; margin-top: 6px; }
        .form-group { margin-bottom: 18px; position: relative; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
        .form-group input {
            width: 100%;
            padding: 12px 44px 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            background: var(--bg);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }
        .form-group input::placeholder { color: #94a3b8; }
        .password-toggle {
            position: absolute;
            right: 14px;
            bottom: 12px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
            padding: 4px;
            opacity: 0.6;
            transition: all 0.2s;
        }
        .password-toggle:hover { opacity: 1; color: var(--text); }
        .password-toggle:active { transform: scale(0.92); }
        .password-toggle.active { opacity: 1; color: var(--primary); }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(99, 102, 241, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .error-message {
            display: none;
            background: #fef2f2;
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            border: 1px solid #fecaca;
        }
        .error-message.show { display: block; }
        .success-message {
            display: none;
            background: #d1fae5;
            color: #059669;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            border: 1px solid #6ee7b7;
        }
        .success-message.show { display: block; }
        .toggle-mode { text-align: center; margin-top: 18px; font-size: 14px; color: var(--muted); }
        .toggle-mode a { color: var(--primary); font-weight: 600; cursor: pointer; text-decoration: none; }
        .toggle-mode a:hover { text-decoration: underline; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 500px) {
            .login-container { padding: 32px 20px; }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <span class="icon">🍎</span>
        <h1 id="form-title">Вход</h1>
        <p id="form-subtitle">Войдите в свой аккаунт, чтобы пройти опрос</p>
    </div>
    <div class="error-message" id="error-message"></div>
    <div class="success-message" id="success-message">✅ Аккаунт создан! Теперь войдите.</div>
    <form id="login-form">
        <div class="form-group">
            <label for="email">📧 Email</label>
            <input type="email" id="email" placeholder="ivan@school.ru" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">🔒 Пароль</label>
            <input type="password" id="password" placeholder="••••••••" required minlength="4" autocomplete="current-password">
            <button type="button" class="password-toggle" id="password-toggle" tabindex="-1">👁️</button>
        </div>
        <button type="submit" class="btn" id="submit-btn">Войти</button>
        <div class="toggle-mode">
            <span id="toggle-text">Нет аккаунта?</span>
            <a id="toggle-link">Зарегистрироваться</a>
        </div>
    </form>
</div>
<script>
    const API_URL = window.location.origin + '/api';

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('password-toggle');
    const submitBtn = document.getElementById('submit-btn');
    const errorEl = document.getElementById('error-message');
    const successEl = document.getElementById('success-message');
    const formTitle = document.getElementById('form-title');
    const formSubtitle = document.getElementById('form-subtitle');
    const toggleText = document.getElementById('toggle-text');
    const toggleLink = document.getElementById('toggle-link');

    let isLoginMode = true;
    let isPasswordVisible = false;

    // Глазок на зажатие
    passwordToggle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isPasswordVisible = true;
        passwordInput.type = 'text';
        passwordToggle.classList.add('active');
        passwordToggle.textContent = '🙈';
    });
    document.addEventListener('mouseup', () => {
        if (isPasswordVisible) {
            isPasswordVisible = false;
            passwordInput.type = 'password';
            passwordToggle.classList.remove('active');
            passwordToggle.textContent = '👁️';
        }
    });
    passwordToggle.addEventListener('mouseleave', () => {
        if (isPasswordVisible) {
            isPasswordVisible = false;
            passwordInput.type = 'password';
            passwordToggle.classList.remove('active');
            passwordToggle.textContent = '👁️';
        }
    });
    passwordToggle.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isPasswordVisible = true;
        passwordInput.type = 'text';
        passwordToggle.classList.add('active');
        passwordToggle.textContent = '🙈';
    });
    passwordToggle.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (isPasswordVisible) {
            isPasswordVisible = false;
            passwordInput.type = 'password';
            passwordToggle.classList.remove('active');
            passwordToggle.textContent = '👁️';
        }
    });

    toggleLink.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
            formTitle.textContent = 'Вход';
            formSubtitle.textContent = 'Войдите в свой аккаунт, чтобы пройти опрос';
            submitBtn.textContent = 'Войти';
            toggleText.textContent = 'Нет аккаунта?';
            toggleLink.textContent = 'Зарегистрироваться';
        } else {
            formTitle.textContent = 'Регистрация';
            formSubtitle.textContent = 'Создайте аккаунт, чтобы пройти опрос';
            submitBtn.textContent = 'Зарегистрироваться';
            toggleText.textContent = 'Уже есть аккаунт?';
            toggleLink.textContent = 'Войти';
        }
        errorEl.classList.remove('show');
        successEl.classList.remove('show');
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
            errorEl.textContent = 'Заполните все поля';
            errorEl.classList.add('show');
            return;
        }
        if (password.length < 4) {
            errorEl.textContent = 'Пароль должен быть минимум 4 символа';
            errorEl.classList.add('show');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Загрузка...';
        errorEl.classList.remove('show');
        successEl.classList.remove('show');

        try {
            const endpoint = isLoginMode ? '/auth/login' : '/auth/register';
            const response = await fetch(`${API_URL}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Ошибка');
            }

            if (isLoginMode) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                successEl.textContent = '✅ Вход выполнен! Перенаправление...';
                successEl.classList.add('show');
                setTimeout(() => { window.location.href = '/'; }, 1000);
            } else {
                successEl.textContent = '✅ Аккаунт создан! Теперь войдите.';
                successEl.classList.add('show');
                setTimeout(() => {
                    isLoginMode = true;
                    formTitle.textContent = 'Вход';
                    formSubtitle.textContent = 'Войдите в свой аккаунт, чтобы пройти опрос';
                    submitBtn.textContent = 'Войти';
                    toggleText.textContent = 'Нет аккаунта?';
                    toggleLink.textContent = 'Зарегистрироваться';
                    emailInput.value = '';
                    passwordInput.value = '';
                    if (isPasswordVisible) {
                        isPasswordVisible = false;
                        passwordInput.type = 'password';
                        passwordToggle.classList.remove('active');
                        passwordToggle.textContent = '👁️';
                    }
                }, 1500);
            }
        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.classList.add('show');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
        }
    });

    if (localStorage.getItem('token')) {
        window.location.href = '/';
    }
</script>
</body>
</html>
